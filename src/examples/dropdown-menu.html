<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashbase — Dropdown Menu Component</title>
  <link rel="stylesheet" href="../baseline/baseline.css">
  <link rel="stylesheet" href="../../themes/default.css" id="theme-stylesheet">
  <link rel="stylesheet" href="../components/dropdown-menu.css">
  <link rel="stylesheet" href="./theme-controls.css">

  <style>
    main {
      max-width: 56rem;
      margin-inline: auto;
      padding: var(--space-2xl);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-lg);
      align-items: center;
    }
  </style>
</head>
<body>
  <main>
    <h1>Dropdown Menu Component</h1>
    <p>Dashbase styles dropdown menus from the native <code>&lt;details&gt;</code> / <code>&lt;summary&gt;</code> pattern. The behavior shim closes menus on outside interaction and adds basic keyboard navigation for menu items.</p>

    <div class="actions">
      <details class="dropdown-menu">
        <summary>Workspace actions</summary>
        <menu>
          <li><button type="button">Rename workspace</button></li>
          <li><button type="button">Duplicate workspace</button></li>
          <li><hr></li>
          <li><button type="button">Archive workspace</button></li>
        </menu>
      </details>

      <details class="dropdown-menu end">
        <summary>Member actions</summary>
        <menu>
          <li><a href="#">View profile</a></li>
          <li><a href="#">Change role</a></li>
          <li><hr></li>
          <li><button type="button">Remove access</button></li>
        </menu>
      </details>
    </div>
  </main>

  <script src="../behaviors/dropdown-menu.js"></script>
  <script src="./theme-controls.js"></script>
</body>
</html>
