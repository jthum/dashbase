<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashbase - Badge Example</title>

    <!-- Import Baseline (Tokens + Primitives) -->
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../baseline/tokens.css">
    <link rel="stylesheet" href="../baseline/primitives.css">
    <link rel="stylesheet" href="../baseline/base.css">

    <!-- Active Theme -->
    <link rel="stylesheet" href="../../themes/default.css">

    <!-- Components -->
    <link rel="stylesheet" href="../components/badge.css">

    <style>
      body {
        padding: 3rem;
        background: var(--color-surface);
        color: var(--color-text);
      }
      .kitchen-sink {
        display: flex;
        flex-direction: column;
        gap: 2rem;
      }
      .row {
        display: flex;
        gap: 1rem;
        align-items: center;
        flex-wrap: wrap;
      }
      h2 {
        font-size: var(--text-lg);
        margin-bottom: 1rem;
        font-weight: 500;
        color: var(--color-text-muted);
      }
    </style>
</head>
<body>
    <div class="kitchen-sink">
      <section>
        <h2>Default Badges</h2>
        <div class="row">
          <ui-badge>Default</ui-badge>
          <ui-badge class="primary">Primary</ui-badge>
          <ui-badge class="danger">Danger</ui-badge>
          <ui-badge class="success">Success</ui-badge>
          <ui-badge class="outline">Outline</ui-badge>
        </div>
      </section>

      <section>
        <h2>Subtle Variants</h2>
        <div class="row">
          <ui-badge class="primary-subtle">Primary Subtle</ui-badge>
          <ui-badge class="danger-subtle">Danger Subtle</ui-badge>
          <ui-badge class="success-subtle">Success Subtle</ui-badge>
        </div>
      </section>

      <section>
        <h2>Sizes</h2>
        <div class="row">
          <ui-badge class="small primary">Small</ui-badge>
          <ui-badge class="primary">Default</ui-badge>
          <ui-badge class="large primary">Large</ui-badge>
        </div>
      </section>
    </div>
</body>
</html>
