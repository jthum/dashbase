<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashbase — Aspect Ratio Component</title>
  <link rel="stylesheet" href="../../baseline/baseline.css">
  <link rel="stylesheet" href="../../../themes/default.css" id="theme-stylesheet">
  <link rel="stylesheet" href="./aspect-ratio.css">
  <link rel="stylesheet" href="../../examples/theme-controls.css">

  <style>
    main {
      max-width: 64rem;
      margin-inline: auto;
      padding: var(--space-2xl);
    }

    .grid {
      display: grid;
      gap: var(--space-xl);
      grid-template-columns: repeat(auto-fit, minmax(14rem, 1fr));
    }

    figure {
      display: grid;
      gap: var(--space-sm);
      margin: 0;
    }

    figcaption {
      color: var(--text-muted);
      font-size: var(--text-sm);
    }
  </style>
</head>
<body>
  <main>
    <h1>Aspect Ratio Component</h1>
    <p>Dashbase uses the semantic <code>&lt;aspect-ratio&gt;</code> wrapper for media frames and placeholders. Set the ratio with <code>--aspect-ratio</code>; use <code>.contain</code> when the child should preserve padding rather than crop.</p>

    <div class="grid">
      <figure>
        <aspect-ratio>
          <svg viewBox="0 0 160 90" role="img" aria-label="Landscape report preview">
            <rect width="160" height="90" fill="var(--color-primary-subtle)"></rect>
            <rect x="12" y="12" width="54" height="66" rx="6" fill="var(--bg-raised)"></rect>
            <rect x="76" y="18" width="56" height="8" rx="4" fill="var(--color-primary)"></rect>
            <rect x="76" y="34" width="40" height="8" rx="4" fill="var(--text-muted)"></rect>
            <rect x="76" y="50" width="48" height="8" rx="4" fill="var(--text-muted)"></rect>
          </svg>
        </aspect-ratio>
        <figcaption>Default 16:9 frame</figcaption>
      </figure>

      <figure>
        <aspect-ratio style="--aspect-ratio: 1 / 1;">
          <svg viewBox="0 0 100 100" role="img" aria-label="Square avatar collage">
            <rect width="100" height="100" fill="var(--color-success-subtle)"></rect>
            <circle cx="32" cy="36" r="16" fill="var(--bg-raised)"></circle>
            <circle cx="68" cy="36" r="16" fill="var(--bg-raised)"></circle>
            <rect x="18" y="60" width="64" height="18" rx="9" fill="var(--bg-raised)"></rect>
          </svg>
        </aspect-ratio>
        <figcaption>Square ratio</figcaption>
      </figure>

      <figure>
        <aspect-ratio class="contain" style="--aspect-ratio: 3 / 4;">
          <svg viewBox="0 0 90 120" role="img" aria-label="Portrait poster preview">
            <rect width="90" height="120" fill="var(--bg-raised)"></rect>
            <rect x="10" y="10" width="70" height="100" rx="10" fill="var(--color-warning-subtle)"></rect>
            <rect x="20" y="24" width="50" height="10" rx="5" fill="var(--color-warning-emphasis)"></rect>
            <rect x="20" y="44" width="38" height="8" rx="4" fill="var(--text-muted)"></rect>
            <rect x="20" y="58" width="46" height="8" rx="4" fill="var(--text-muted)"></rect>
          </svg>
        </aspect-ratio>
        <figcaption>Portrait ratio with contain fit</figcaption>
      </figure>
    </div>
  </main>

  <script src="../../examples/theme-controls.js"></script>
</body>
</html>
