<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashbase Pattern — Login Box / Minimal</title>
  <link rel="stylesheet" href="../../../../baseline/baseline.css">
  <link rel="stylesheet" href="../../../../../themes/default.css" id="theme-stylesheet">
  <link rel="stylesheet" href="../../../../components/card/card.css">
  <link rel="stylesheet" href="../../../../components/button/button.css">
  <link rel="stylesheet" href="../../../../components/input/input.css">
  <link rel="stylesheet" href="../../../../components/label/label.css">
  <link rel="stylesheet" href="../../../../components/checkbox/checkbox.css">
  <link rel="stylesheet" href="../../../../components/form-field/form-field.css">

  <style>
    main {
      max-width: 28rem;
      margin-inline: auto;
      padding: min(12vh, var(--space-4xl)) var(--space-xl);
    }

    /* @fragment pattern-styles:start */
    .meta {
      display: grid;
      gap: var(--space-xs);
    }

    .meta > * {
      margin: 0;
    }

    .login-form {
      display: grid;
      gap: var(--space-lg);
    }

    .inline-group {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .login-actions {
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
    }
    /* @fragment pattern-styles:end */
  </style>
</head>
<body>
  <main>
    <!-- @fragment pattern:start -->
    <!-- @fragment panel:start -->
    <article class="card" aria-labelledby="login-box-title">
      <header>
        <div class="meta">
          <h1 id="login-box-title">{{title}}</h1>
          <p>{{description}}</p>
        </div>
      </header>

      <card-content>
        <form class="login-form">
          <form-field>
            <label class="required" for="login-email">{{emailLabel}}</label>
            <input id="login-email" type="email" placeholder="{{emailPlaceholder}}" required autocomplete="email">
          </form-field>

          <form-field>
            <label class="required" for="login-password">{{passwordLabel}}</label>
            <input id="login-password" type="password" placeholder="{{passwordPlaceholder}}" required autocomplete="current-password">
          </form-field>

          <div class="inline-group">
            <input type="checkbox" id="remember-session">
            <label for="remember-session">{{rememberLabel}}</label>
          </div>
        </form>
      </card-content>

      <footer>
        <div class="login-actions">
          <button class="primary" type="submit">{{submitLabel}}</button>
          <button class="ghost" type="button">{{secondaryLabel}}</button>
          {{footerNote}}
        </div>
      </footer>
    </article>
    <!-- @fragment panel:end -->
    <!-- @fragment pattern:end -->
  </main>
</body>
</html>
