<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashbase Pattern — Form Field / Select With Helper Error</title>
  <link rel="stylesheet" href="../../../../baseline/baseline.css">
  <link rel="stylesheet" href="../../../../../themes/default.css" id="theme-stylesheet">
  <link rel="stylesheet" href="../../../../components/label/label.css">
  <link rel="stylesheet" href="../../../../components/select/select.css">
  <link rel="stylesheet" href="../../../../components/form-field/form-field.css">

  <style>
    main {
      max-width: 32rem;
      margin-inline: auto;
      padding: var(--space-2xl);
    }

    /* @fragment pattern-styles:start */
    .surface {
      padding: var(--space-xl);
      border: var(--border-width) solid var(--border-default);
      border-radius: var(--radius-xl);
      background: linear-gradient(
        180deg,
        color-mix(in oklch, var(--bg-raised) 92%, transparent),
        color-mix(in oklch, var(--bg-subtle) 68%, transparent)
      );
    }

    .surface > * {
      margin: 0 0 var(--space-md);
    }

    .surface > :last-child {
      margin-bottom: 0;
    }
    /* @fragment pattern-styles:end */
  </style>
</head>
<body>
  <main>
    <!-- @fragment pattern:start -->
    <section class="surface" aria-labelledby="birth-state-pattern-title">
      <h1 id="birth-state-pattern-title">{{title}}</h1>
      <p>{{description}}</p>

      <form-field>
        <label class="required" for="birth-state">{{label}}</label>
        <select id="birth-state" required aria-describedby="birth-state-help birth-state-error">
          <option value="">Choose a state</option>
          <option>Andhra Pradesh</option>
          <option>Karnataka</option>
          <option>Maharashtra</option>
          <option>Tamil Nadu</option>
          <option>Telangana</option>
        </select>
        <small id="birth-state-help">{{helper}}</small>
        <small id="birth-state-error" class="error">{{error}}</small>
      </form-field>
    </section>
    <!-- @fragment pattern:end -->
  </main>
</body>
</html>
